<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/modern-style.css">
</head>
<body>
    <div id="app">
        <!-- Login Screen -->
        <div id="loginScreen" class="d-flex align-items-center justify-content-center" style="min-height:100vh; background:linear-gradient(135deg, #667eea, #764ba2);">
            <div class="card p-4" style="width:400px; border-radius:16px;">
                <h3 class="text-center mb-4">CRM Pro Login</h3>
                <div id="loginError" class="alert alert-danger" style="display:none;"></div>
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" id="loginEmail" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" id="loginPassword" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Sign In</button>
                </form>
                <p class="text-center mt-3 text-muted small">
                    Demo: superadmin@crm.com / password123
                </p>
            </div>
        </div>
        
        <!-- Main App (Hidden until login) -->
        <div id="mainApp" style="display:none;">
            <!-- Sidebar -->
            <nav class="bg-dark text-white p-3" style="width:250px; position:fixed; top:0; left:0; bottom:0; overflow-y:auto;">
                <h4 class="mb-4">CRM Pro</h4>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link text-white" href="#" onclick="showPage('dashboard')"><i class="fas fa-home me-2"></i>Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="#" onclick="showPage('companies')"><i class="fas fa-building me-2"></i>Companies</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="#" onclick="showPage('contacts')"><i class="fas fa-address-book me-2"></i>Contacts</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="#" onclick="showPage('deals')"><i class="fas fa-handshake me-2"></i>Deals</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="#" onclick="showPage('tickets')"><i class="fas fa-ticket-alt me-2"></i>Tickets</a></li>
                    <li class="nav-item"><a class="nav-link text-white" href="#" onclick="showPage('reports')"><i class="fas fa-chart-bar me-2"></i>Reports</a></li>
                    <li class="nav-item mt-auto"><a class="nav-link text-white" href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
                </ul>
            </nav>
            
            <!-- Main Content -->
            <div style="margin-left:250px; padding:20px;">
                <div id="pageContent">
                    <h2>Dashboard</h2>
                    <div id="dashboardStats" class="row g-3"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
